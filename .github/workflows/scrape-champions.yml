name: Champion Data Scraper

on:
  # Manual trigger - allows you to run whenever you want
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: false
        default: "production"
        type: choice
        options:
          - development
          - staging
          - production

  # Scheduled execution every 24 hours
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight UTC

  # Run on push to main branch for testing
  push:
    branches: [main, master]
    paths:
      - "scraper/**"
      - "*.py"
      - "requirements.txt"

env:
  ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}

jobs:
  # Pre-deployment validation
  validate:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if deployment is needed
        id: check
        run: |
          # Check if there are actual changes to python code
          if git diff --name-only HEAD~1 | grep -qE "^(scraper/|.*\.py|requirements\.txt)"; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "🔄 Changes detected in scraper code"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "🔄 Manual trigger - proceeding with deployment"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "🔄 Scheduled run - proceeding with scraping"
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            echo "⏭️ No changes detected, skipping deployment"
          fi

  # Main scraping job
  scrape:
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.should_deploy == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Validate configuration
        run: |
          python -c "
          from scraper.config import get_config
          config = get_config()
          print('✅ Configuration loaded successfully')
          print(f'Environment: {config.environment}')
          print(f'Debug: {config.debug}')
          "

      - name: Run tests
        run: |
          # Install test dependencies
          pip install pytest
          # Run tests if they exist
          if [ -d "tests" ]; then
            python -m pytest tests/ -v --tb=short
          else
            echo "⚠️ No tests directory found, skipping tests"
          fi

      - name: Run champion scraper
        id: scrape
        timeout-minutes: 40
        env:
          TURSO_DB_URL: ${{ secrets.TURSO_DB_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          ENVIRONMENT: ${{ env.ENVIRONMENT }}
          DEBUG: ${{ env.ENVIRONMENT == 'development' }}
        run: |
          # Set start time for monitoring
          echo "SCRAPE_START_TIME=$(date +%s)" >> $GITHUB_ENV

          # Show initial progress
          echo "🚀 Starting champion scraper..."
          echo "⏰ Timeout: 40 minutes"

          # Run the scraper with timeout - tee to both console and file
          timeout 40m python lambda_function.py 2>&1 | tee scraper_output.log
          EXIT_CODE=${PIPESTATUS[0]}

          # Report results
          if [ $EXIT_CODE -eq 0 ]; then
            echo "SCRAPE_EXIT_CODE=0" >> $GITHUB_ENV
            echo "✅ Scraping script completed successfully"
          elif [ $EXIT_CODE -eq 124 ]; then
            echo "SCRAPE_EXIT_CODE=124" >> $GITHUB_ENV
            echo "⏰ Scraping script timed out after 40 minutes"
          else
            echo "SCRAPE_EXIT_CODE=$EXIT_CODE" >> $GITHUB_ENV
            echo "⚠️ Scraping script exited with code $EXIT_CODE"
          fi

          # Check if summary was created by the script
          if [ -f "scrape_summary.json" ]; then
            echo "SCRAPE_STATUS=success" >> $GITHUB_ENV
            echo "✅ Summary file created by script"
          else
            echo "SCRAPE_STATUS=completed" >> $GITHUB_ENV
            echo "⚠️ No summary file - script may have issues"
          fi
        continue-on-error: true

      - name: Generate deployment summary
        id: summary
        run: |
          # Calculate duration
          end_time=$(date +%s)
          start_time=${{ env.SCRAPE_START_TIME }}
          duration=$((end_time - start_time))

          # Check if script created summary
          if [ -f "scrape_summary.json" ]; then
            # Use the summary created by the script
            echo "Using summary created by script"
          else
            # Create fallback summary using jq to avoid heredoc issues
            jq -n \
              --arg timestamp "$(date -Iseconds)" \
              --arg environment "${{ env.ENVIRONMENT }}" \
              --arg status "${{ env.SCRAPE_STATUS }}" \
              --argjson exit_code ${{ env.SCRAPE_EXIT_CODE }} \
              --argjson duration "$duration" \
              --arg commit_sha "${{ github.sha }}" \
              --arg run_id "${{ github.run_id }}" \
              --arg trigger "${{ github.event_name }}" \
              '{
                timestamp: $timestamp,
                environment: $environment,
                status: $status,
                exit_code: $exit_code,
                duration_seconds: $duration,
                commit_sha: $commit_sha,
                run_id: $run_id,
                trigger: $trigger,
                note: "Fallback summary - script did not create summary file"
              }' > scrape_summary.json
            echo "Created fallback summary"
          fi

          echo "summary=$(cat scrape_summary.json | jq -c .)" >> $GITHUB_OUTPUT

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-logs-${{ github.run_id }}
          path: |
            scraper.log
            scraper_output.log
            scrape_summary.json
          retention-days: 7

  # Notification job
  notify:
    runs-on: ubuntu-latest
    needs: [validate, scrape]
    if: always() && (needs.scrape.result == 'success' || needs.scrape.result == 'failure')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download logs
        uses: actions/download-artifact@v4
        with:
          name: scrape-logs-${{ github.run_id }}

      - name: Send notification
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # Read summary
          if [ -f "scrape_summary.json" ]; then
            summary=$(cat scrape_summary.json)
            status=$(echo $summary | jq -r '.status')
            duration=$(echo $summary | jq -r '.duration_seconds')
            environment=$(echo $summary | jq -r '.environment')
          else
            status="unknown"
            duration="unknown"
            environment="${{ env.ENVIRONMENT }}"
          fi

          # Create notification message
          if [ "$status" = "success" ]; then
            message="✅ Champion data scraping completed successfully\n• Environment: $environment\n• Duration: ${duration}s\n• Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            message="❌ Champion data scraping failed\n• Environment: $environment\n• Duration: ${duration}s\n• Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n• Check logs for details"
          fi

          # Send to Slack if webhook exists
          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"$message\"}" \
              $SLACK_WEBHOOK
          fi

          # Send to Discord if webhook exists
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"content\":\"$message\"}" \
              $DISCORD_WEBHOOK
          fi

  # Health check job (runs after successful scraping)
  health_check:
    runs-on: ubuntu-latest
    needs: scrape
    if: needs.scrape.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run health checks
        run: |
          echo "🏥 Running post-deployment health checks..."

          # Check if Firebase data is accessible (basic connectivity test)
          # This would be expanded based on your specific health check needs

          echo "✅ Health checks completed"

  # Rollback job (manual trigger only)
  rollback:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'rollback'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rollback procedure
        run: |
          echo "🔄 Performing rollback procedure..."
          # Implement rollback logic here
          # This could involve restoring from backup or previous deployment

          echo "✅ Rollback completed"
